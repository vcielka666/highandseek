name: Deploy H&S

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 138.68.74.105
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: "30m"
          script: |
            cd /var/www/highandseek
            git pull
            pnpm install --frozen-lockfile
            rm -rf .next
            NODE_OPTIONS="--max-old-space-size=1536" pnpm build
            pm2 restart highandseek
            pm2 restart seekers || true
            echo "✅ H&S deployed"
